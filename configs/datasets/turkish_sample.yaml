# ══════════════════════════════════════════════════════════════════════════════
# TURKISH SAMPLE DATASET -- 10 hours for pipeline validation (Phase 1)
#
# Source:  MediaSpeech (OpenSLR 108) -- CC BY 4.0
# URL:     https://www.openslr.org/108/
# Stats:   ~2500 utterances, media speech (no speaker IDs), 16kHz mono FLAC
# Paper:   Kolobov et al., "MediaSpeech: Multilanguage ASR Benchmark and
#          Dataset", arXiv:2103.16193, 2021
# Purpose: Validate the full training + evaluation pipeline before scaling to
#          larger datasets.
# ══════════════════════════════════════════════════════════════════════════════

dataset:
  name: "turkish_sample"
  language: "tr"               # ISO 639-1 code. Used by Whisper for WER.
  source: "local"              # Options: "local", "huggingface".
  local_raw_dir: "data/turkish_sample_raw"  # Where the extracted TR/ directory is placed.

  # Column mappings (null = inferred from file/directory structure).
  audio_column: null
  text_column: null
  speaker_column: null         # MediaSpeech has no speaker IDs.
  duration_column: null

  num_examples: 2500           # Approximate utterance count (~2500 FLAC files).
  estimated_hours: 10

  target_sr: 24000             # All codecs expect 24kHz.
  original_sr: 16000           # MediaSpeech audio is 16kHz. Will resample 16kHz -> 24kHz.
  mono: true                   # Force mono channel.

  splits:
    method: "random"           # No speaker IDs available; use random splits.
    train_ratio: 0.8           # 80% train.
    val_ratio: 0.1             # 10% validation.
    test_ratio: 0.1            # 10% test.
    min_speaker_utterances: 1  # Not applicable for random splits.

  filters:
    min_duration_s: 0.5        # Skip utterances shorter than 0.5 seconds.
    max_duration_s: 30.0       # Truncate utterances longer than 30 seconds.
    max_clip_ratio: 0.05       # Skip if >5% of audio frames are clipped.

  local_dir: "data/turkish_sample"  # Where processed audio + manifests are saved.
