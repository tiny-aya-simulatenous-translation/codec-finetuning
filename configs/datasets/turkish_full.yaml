# ══════════════════════════════════════════════════════════════════════════════
# TURKISH FULL DATASET -- ~251k utterances from HuggingFace (Phase 2)
#
# Source:   HuggingFace (public repo)
# Repo:     tiny-aya-translate/tr-subset-v0.1
# Stats:    251,118 utterances, ~62.4 GB, has audio + text columns
# Duration: Audio durations range 0.44s to 40.9s
# Purpose:  Full-scale Turkish fine-tuning for Phase 2.
#
# Usage:
#   uv run python prepare_data.py --config configs/datasets/turkish_full.yaml
# ══════════════════════════════════════════════════════════════════════════════

dataset:
  name: "turkish_full"
  language: "tr"               # ISO 639-1 code. Used by Whisper for WER.
  source: "huggingface"
  hf_repo: "tiny-aya-translate/tr-subset-v0.1"
  hf_split: "train"           # Only split available in this dataset.

  audio_column: "audio"        # HF datasets column containing audio data.
  text_column: "text"          # Column with transcription text.
  speaker_column: null         # No speaker IDs in this dataset.
  duration_column: null        # Auto-computed from audio length.

  num_examples: 251118
  estimated_hours: 100         # Approximate based on dataset size.

  target_sr: 24000             # All codecs expect 24 kHz.
  original_sr: null            # Auto-detected from HF audio metadata.
  mono: true

  splits:
    method: "random"           # No speaker IDs available; use random splits.
    train_ratio: 0.9           # 90% train.
    val_ratio: 0.05            # 5% validation.
    test_ratio: 0.05           # 5% test.
    min_speaker_utterances: 1

  filters:
    min_duration_s: 0.5        # Skip utterances shorter than 0.5 seconds.
    max_duration_s: 30.0       # Truncate utterances longer than 30 seconds.
    max_clip_ratio: 0.05       # Skip if >5% of audio frames are clipped.

  local_dir: "data/turkish_full"
