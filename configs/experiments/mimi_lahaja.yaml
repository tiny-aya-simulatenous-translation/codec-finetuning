# ══════════════════════════════════════════════════════════════════════════════
# EXPERIMENT: Evaluate Mimi on Lahaja Hindi eval set
#
# Purpose: Evaluate the fine-tuned Mimi checkpoint (trained on ~90h Hindi)
#          on the out-of-distribution Lahaja Hindi benchmark (~6.2h, 132 spkrs).
# Codec:   Mimi (kyutai/mimi, 96M params, 12.5Hz, 8 codebooks)
# Dataset: Lahaja-eval (~6.2h, tiny-aya-translate/lahaja-eval, public)
#
# NOTE: This is an eval-only config.  The training hyperparameters below
# are carried over from the mimi_hindi training run (sweep best ooz250pm)
# because config_loader.py validates their presence.  They are NOT used
# during evaluation.
#
# Prerequisites:
#   1. Prepare the Lahaja dataset:
#      uv run --extra train --extra eval python scripts/prepare_lahaja.py
#   2. Have a trained checkpoint at outputs/mimi_hindi/checkpoint_step_50000.pt
#
# Usage:
#   uv run python eval/run_all.py \
#       --config configs/experiments/mimi_lahaja.yaml \
#       --checkpoint outputs/mimi_hindi/checkpoint_step_50000.pt \
#       --use-ema
# ══════════════════════════════════════════════════════════════════════════════

_bases_:
  - "../base.yaml"
  - "../codecs/mimi.yaml"
  - "../datasets/lahaja.yaml"

# ── Training hyperparameters (from mimi_hindi sweep best, eval-only) ────────
# These are required by config validation but not used during evaluation.

optimizer:
  name: "schedulefree_adamw"
  lr: !!float 1.074e-3         # Sweep-best LR from ooz250pm.
  betas: [0.9, 0.95]
  weight_decay: 0.0

scheduler:
  name: "constant"
  warmup_steps: 0

training:
  max_steps: 50000             # Not used during eval.
  eval_every: 1000
  save_every: 2500
  log_every: 50
  audio_log_every: 500

codec:
  latency_ms: 0              # Batch eval: no streaming latency alignment needed.
  training:
    segment_s: 10.0            # Not used during eval.
    freeze_encoder_steps: 0

augmentation:
  preset: "none"               # No augmentation for eval.

discriminator:
  warmup_steps: 0
  lr_ratio: 0.1
  r1_penalty: 50.0

ema:
  decay: 0.999

early_stopping:
  patience: 10

wandb:
  tags: ["mimi", "hindi", "lahaja", "eval"]
  run_name: "mimi-lahaja-eval"

output_dir: "outputs/mimi_lahaja"
