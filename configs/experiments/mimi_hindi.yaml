# ══════════════════════════════════════════════════════════════════════════════
# EXPERIMENT: Fine-tune Mimi on ~90h Hindi
#
# Purpose: Phase 2 -- full-scale training on Hindi conversational speech.
# Codec:   Mimi (kyutai/mimi, 96M params, 12.5Hz, 8 codebooks)
# Dataset: Hindi (~90h, tiny-aya-translate/hinglish-casual, private HF repo)
#
# Hyperparameters: Best run (ooz250pm) from mimi-hp-sweep (j7oxgz4p),
#                  val_loss=0.01222 on 10h Turkish sample. Scaled training
#                  budget for ~90h dataset.
#
# Prerequisites:
#   Run `huggingface-cli login` with your team's token before training.
#
# Usage:
#   uv run python train/train_mimi.py --config configs/experiments/mimi_hindi.yaml
# ══════════════════════════════════════════════════════════════════════════════

_bases_:
  - "../base.yaml"
  - "../codecs/mimi.yaml"
  - "../datasets/hindi.yaml"

# ── Overrides from best sweep run (ooz250pm) ────────────────────────────────

optimizer:
  name: "schedulefree_adamw"
  lr: !!float 1.074e-3
  betas: [0.9, 0.95]
  weight_decay: 0.0

scheduler:
  name: "constant"
  warmup_steps: 0

training:
  max_steps: 50000             # ~9x data vs sweep (10h), scaled from 5000.
  eval_every: 1000
  save_every: 2500
  log_every: 50
  audio_log_every: 500

codec:
  training:
    segment_s: 10.0
    freeze_encoder_steps: 0

augmentation:
  preset: "none"

discriminator:
  warmup_steps: 0
  lr_ratio: 0.1
  r1_penalty: 50.0

ema:
  decay: 0.999

early_stopping:
  patience: 10

wandb:
  tags: ["mimi", "hindi", "phase2", "sweep-best"]
  run_name: "mimi-hindi-sweep-best"

output_dir: "outputs/mimi_hindi"
