# Evaluate pretrained Mimi on Turkish OpenSLR 108 (OOD broadcast)
_bases_:
  - "../base.yaml"
  - "../codecs/mimi.yaml"
  - "../datasets/turkish_openslr.yaml"

optimizer:
  name: "schedulefree_adamw"
  lr: !!float 1e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0

scheduler:
  name: "constant"
  warmup_steps: 0

training:
  max_steps: 50000
  eval_every: 1000
  save_every: 2500
  log_every: 50
  audio_log_every: 500

codec:
  latency_ms: 0
  training:
    segment_s: 10.0
    freeze_encoder_steps: 0

augmentation:
  preset: "none"

discriminator:
  warmup_steps: 0
  lr_ratio: 0.1
  r1_penalty: 50.0

ema:
  decay: 0.999

early_stopping:
  patience: 10

wandb:
  tags: ["mimi", "turkish", "openslr", "baseline", "eval"]
  run_name: "mimi-turkish-openslr-baseline"

output_dir: "outputs/mimi_turkish_openslr_baseline"
