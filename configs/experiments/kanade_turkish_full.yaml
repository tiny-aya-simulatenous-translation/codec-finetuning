# ══════════════════════════════════════════════════════════════════════════════
# EXPERIMENT: Fine-tune Kanade on ~100h Turkish (full dataset)
#
# Purpose: Phase 2 -- full-scale training on complete Turkish corpus.
#          This config is a placeholder until the full dataset is available.
# Codec:   Kanade (frothywater/kanade-25hz-clean, 142M params, 25Hz,
#          1 codebook with 12800 vocab)
# Dataset: Turkish full (~100h, placeholder -- update when data is ready)
#
# Usage:
#   uv run python train/train_kanade.py --config configs/experiments/kanade_turkish_full.yaml
# ══════════════════════════════════════════════════════════════════════════════

_bases_:
  - "../base.yaml"
  - "../codecs/kanade.yaml"
  - "../datasets/turkish_full.yaml"

# ── Overrides for this experiment ────────────────────────────────────────────

training:
  max_steps: 80000             # Kanade trains slightly fewer steps than Mimi.
  eval_every: 2000
  save_every: 5000

optimizer:
  lr: !!float 2e-4

augmentation:
  preset: "light"              # Light augmentation -- large dataset provides
                               # sufficient diversity on its own.

early_stopping:
  patience: 5

wandb:
  tags: ["kanade", "turkish", "full", "phase2"]
  run_name: "kanade-tr-full"

output_dir: "outputs/kanade_turkish_full"
