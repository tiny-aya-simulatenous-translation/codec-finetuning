# ══════════════════════════════════════════════════════════════════════════════
# EXPERIMENT: Evaluate fine-tuned Mimi on Turkish sample test set
#
# Purpose: Evaluate the best sweep checkpoint (ooz250pm) on the held-out
#          Turkish test set (252 utterances).
# Codec:   Mimi (kyutai/mimi, 96M params, 12.5Hz, 8 codebooks)
# Dataset: Turkish sample (10h, MediaSpeech OpenSLR 108, CC BY 4.0)
# Checkpoint: outputs/sweeps/mimi_turkish_sample/ooz250pm/checkpoint_step_5000.pt
#
# Usage:
#   uv run python eval/run_all.py \
#       --config configs/experiments/mimi_turkish_eval.yaml \
#       --checkpoint outputs/sweeps/mimi_turkish_sample/ooz250pm/checkpoint_step_5000.pt \
#       --use-ema
# ══════════════════════════════════════════════════════════════════════════════

_bases_:
  - "../base.yaml"
  - "../codecs/mimi.yaml"
  - "../datasets/turkish_sample.yaml"

# ── Overrides from best sweep run (ooz250pm) ────────────────────────────────

optimizer:
  name: "schedulefree_adamw"
  lr: !!float 1.074e-3
  betas: [0.9, 0.95]
  weight_decay: 0.0

scheduler:
  name: "constant"
  warmup_steps: 0

training:
  max_steps: 5000

codec:
  training:
    segment_s: 10.0
    freeze_encoder_steps: 0

augmentation:
  preset: "none"

discriminator:
  warmup_steps: 0
  lr_ratio: 0.1
  r1_penalty: 50.0

ema:
  decay: 0.999

wandb:
  tags: ["mimi", "turkish", "eval", "sweep-best"]
  run_name: "mimi-turkish-eval"

output_dir: "outputs/mimi_turkish_eval"
