# Fine-tune Mimi on Turkish (Common Voice) with conservative hyperparameters.
#
# Turkish CV train is ~19h (26k utterances), smaller than Hindi (~90h).
# At batch 16, 1 epoch ~= 1656 steps, so 10k steps ~= 6 epochs.
#
# Usage:
#   uv run python train/train_mimi.py \
#       --config configs/experiments/mimi_turkish_cv_ft.yaml

_bases_:
  - "../base.yaml"
  - "../codecs/mimi.yaml"
  - "../datasets/turkish_cv.yaml"

optimizer:
  name: "schedulefree_adamw"
  lr: !!float 1e-4
  betas: [0.9, 0.95]
  weight_decay: 0.01

scheduler:
  name: "cosine"
  warmup_steps: 500
  min_lr_ratio: 0.01

training:
  max_steps: 10000
  eval_every: 500
  save_every: 1000
  log_every: 50
  audio_log_every: 500

codec:
  latency_ms: 0
  training:
    segment_s: 10.0
    freeze_encoder_steps: 2000

augmentation:
  preset: "light"

discriminator:
  warmup_steps: 500
  lr_ratio: 0.1
  r1_penalty: 50.0

ema:
  decay: 0.999

early_stopping:
  patience: 5

wandb:
  tags: ["mimi", "turkish", "ft-v2", "conservative"]
  run_name: "mimi-turkish-cv-ft"

output_dir: "outputs/mimi_turkish_cv_ft"
