# Evaluate pretrained DualCodec on Turkish CV test set (in-distribution)
_bases_:
  - "../base.yaml"
  - "../codecs/dualcodec.yaml"
  - "../datasets/turkish_cv.yaml"

optimizer:
  name: "schedulefree_adamw"
  lr: !!float 2e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0

scheduler:
  name: "constant"
  warmup_steps: 0

training:
  max_steps: 80000
  eval_every: 2000
  save_every: 5000
  log_every: 50
  audio_log_every: 500

codec:
  latency_ms: 0
  training:
    segment_s: 5.0
    freeze_encoder_steps: 0

augmentation:
  preset: "none"

discriminator:
  warmup_steps: 0
  lr_ratio: 0.1
  r1_penalty: 50.0

ema:
  decay: 0.999

early_stopping:
  patience: 5

wandb:
  tags: ["dualcodec", "turkish", "baseline", "eval"]
  run_name: "dualcodec-turkish-cv-baseline"

output_dir: "outputs/dualcodec_turkish_cv_baseline"
