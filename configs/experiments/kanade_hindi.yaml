# ══════════════════════════════════════════════════════════════════════════════
# EXPERIMENT: Fine-tune Kanade on ~90h Hindi
#
# Purpose: Phase 2 -- full-scale training on Hindi conversational speech.
# Codec:   Kanade (frothywater/kanade-25hz-clean, 142M params, 25Hz,
#          1 codebook with 12800 vocab)
# Dataset: Hindi (~90h, tiny-aya-translate/hinglish-casual, private HF repo)
#
# Prerequisites:
#   Run `huggingface-cli login` with your team's token before training.
#
# Usage:
#   uv run python train/train_kanade.py --config configs/experiments/kanade_hindi.yaml
# ══════════════════════════════════════════════════════════════════════════════

_bases_:
  - "../base.yaml"
  - "../codecs/kanade.yaml"
  - "../datasets/hindi.yaml"

# ── Overrides for this experiment ────────────────────────────────────────────

training:
  max_steps: 80000             # Kanade trains slightly fewer steps than Mimi.
  eval_every: 2000
  save_every: 5000

optimizer:
  lr: !!float 2e-4

augmentation:
  preset: "light"              # Light augmentation -- large dataset provides
                               # sufficient diversity on its own.

early_stopping:
  patience: 5

wandb:
  tags: ["kanade", "hindi", "phase2"]
  run_name: "kanade-hindi"

output_dir: "outputs/kanade_hindi"
